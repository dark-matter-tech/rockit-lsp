name: CI

# Rockit Language Server Protocol
on:
  push:
  pull_request:
    branches: [develop, master, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux (Ubuntu 22.04, Swift 5.10)
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install system dependencies
        run: |
          apt-get update -q
          apt-get install -y -q libssl-dev pkg-config git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release

  macos:
    name: macOS (ARM64)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release
