name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build LSP (Linux)
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq libssl-dev pkg-config git

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Build (release)
        run: swift build -c release

  mirror:
    name: Mirror to GitHub
    runs-on: ubuntu-22.04
    needs: [build]
    if: github.event_name == 'push'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --bare "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}
      - name: Push to GitHub
        run: |
          git remote add github "https://x-access-token:${GH_MIRROR_PAT}@github.com/rockit-engine/rockit-lsp.git"
          git push github --all --force
          git push github --tags --force
          echo "Mirrored to GitHub"
        env:
          GH_MIRROR_PAT: ${{ secrets.GH_MIRROR_PAT }}
